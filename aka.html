<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卍煞氣ㄟ 英打aka怪物防衛戰卍</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* 基本字體與背景設定 */
    body { 
      font-family: 'Noto Sans TC', monospace; 
      background-color: #111116; 
      color: #d1d5db; 
      overflow-x: hidden; 
    }
    .pixel-font { font-family: 'Press Start 2P', monospace; }
    
    /* 復古街機風格按鈕與邊框 */
    .retro-border {
      border: 4px solid #000000;
      box-shadow: 4px 4px 0px #222225;
    }
    .retro-btn {
      border: 3px solid #000000;
      box-shadow: 3px 3px 0px #000000;
      transition: all 0.1s ease;
    }
    .retro-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0px #000000;
    }

    /* 基地受傷時的紅色閃爍與震動動畫 */
    @keyframes damageShake { 
      0%, 100% { transform: translateX(0); } 
      20%, 60% { transform: translateX(-6px); } 
      40%, 80% { transform: translateX(6px); } 
    }
    .damage-flash { animation: damageShake 0.3s ease-in-out; border-color: #ef4444 !important; }
    
    /* ======== 單字輸入錯誤的專屬純左右震動動畫 ======== */
    @keyframes errorShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    .error-shake {
      animation: errorShake 0.3s ease-in-out;
    }

    /* 遊戲戰場的網格背景 */
    .graveyard-bg {
      background-color: #1a1a24;
      background-image: linear-gradient(to right, #242432 1px, transparent 1px), linear-gradient(to bottom, #242432 1px, transparent 1px);
      background-size: 20px 20px;
    }
    
    /* 怪物死亡時的粒子爆破動畫 */
    .pixel-particle { 
      position: absolute; 
      pointer-events: none; 
      animation: particleBlow 0.5s steps(8) forwards; 
    }
    @keyframes particleBlow { 
      0% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; } 
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } 
    }

    /* 雷射子彈樣式 */
    .bullet {
      position: absolute;
      width: 12px;
      height: 12px;
      background-color: #f59e0b;
      border: 2px solid #000;
      box-shadow: 0 0 8px #f59e0b;
      z-index: 25;
      pointer-events: none;
      transform: translate(-50%, -50%);
    }

    /* 波次切換時的文字放大淡出動畫 */
    @keyframes wavePop {
      0% { transform: scale(0.5); opacity: 0; }
      15% { transform: scale(1.1); opacity: 1; }
      30% { transform: scale(1); opacity: 1; }
      85% { transform: scale(1); opacity: 1; filter: blur(0px); }
      100% { transform: scale(1.3); opacity: 0; filter: blur(4px); }
    }
    .wave-banner-anim {
      animation: wavePop 1.5s ease-in-out forwards;
    }
    
    /* 鎖定輸入框時的視覺提示（變暗） */
    input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-2 md:p-4 select-none">

  <!-- 遊戲主容器 -->

    <div class="h-3 w-full bg-[#cc5500]"></div>

      <div class="flex flex-col lg:flex-row gap-4">

        <div class="w-full lg:w-64 bg-[#282836] border-4 border-black p-4 flex flex-col gap-4">

          <div class="flex items-center gap-3 bg-[#161622] p-3 border-2 border-black">

                <rect x="12" y="6" width="16" height="16" fill="#fca5a5"/><rect x="10" y="14" width="20" height="6" fill="#111"/><rect x="14" y="20" width="12" height="14" fill="#444"/><rect x="8" y="16" width="4" height="12" fill="#b91c1c"/><circle cx="16" cy="11" r="2" fill="#000"/><circle cx="24" cy="11" r="2" fill="#000"/>
              </svg>
            </div>
            <div class="flex-1 min-w-0">
              <div id="playerNameDisplay" class="text-xs text-amber-500 font-bold tracking-tight truncate pixel-font">PLAYER_01</div>

                <span class="text-red-500 font-bold">❤ HP</span><span id="hpText" class="font-bold pixel-font">100/100</span>
              </div>
              <div class="w-full h-3 bg-black border-2 border-black overflow-hidden mt-1">
                <div id="hpBar" class="h-full bg-emerald-600 transition-all duration-100" style="width: 100%;"></div>
              </div>
            </div>
          </div>

          <!-- 遊戲即時數據區塊 -->
          <div class="flex flex-col gap-3 bg-[#161622] p-3 border-2 border-black shadow-md">
            <!-- 波次 -->
            <div class="flex items-center justify-between border-b border-gray-800 pb-2">
              <span class="text-red-500 font-bold text-xs pixel-font">WAVE</span>
              <span id="wave" class="pixel-font text-base font-black text-red-500">1</span>
            </div>
            <!-- 擊殺數 -->
            <div class="flex items-center justify-between border-b border-gray-800 pb-2 pt-0.5">
              <span class="text-amber-500 font-bold text-xs pixel-font">KILLS</span>
              <span id="liveKills" class="pixel-font text-sm font-black text-amber-500">0</span>
            </div>
            <!-- 本波剩餘怪物進度條 (遞減顯示) -->
            <div class="mt-1">
              <div class="flex justify-between items-center text-[10px] font-bold text-gray-400 pixel-font mb-1">
                <span>REMAINING</span>
                <span id="progressText">5/5</span>
              </div>
              <!-- 進度條外框 -->
              <div class="w-full h-2.5 bg-black border border-stone-700 overflow-hidden">
                <!-- 進度條本體：一開始100%，慢慢減少 -->
                <div id="progressBar" class="h-full bg-amber-600 transition-all duration-200" style="width: 100%;"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- 右側遊戲戰場與輸入區 -->
        <div class="flex-1 flex flex-col gap-3">

          <div class="relative bg-[#161622] border-4 border-black py-3 px-5 flex items-center justify-between min-h-[76px] shadow-inner">
            <div class="absolute top-1 left-4 text-[9px] text-gray-500 font-black tracking-widest pixel-font">TARGET_LOCK_ON</div>
            <div id="wordBox" class="text-xl md:text-2xl font-black tracking-[3px] select-none transition-all mt-2 flex-1 leading-relaxed text-gray-200">READY...</div>
          </div>

            <!-- 怪物移動軌跡線 -->
            <svg id="laserSvg" width="100%" height="100%" viewBox="0 0 900 450" preserveAspectRatio="none" class="absolute inset-0 pointer-events-none z-15">
              <path id="pathLine" d="" fill="none" stroke="#333344" stroke-width="6" stroke-linejoin="miter"/>
            </svg>

            <div class="absolute left-[51px] top-[225px] transform -translate-y-1/2 -translate-x-1/2 z-20 flex flex-col items-center">

            </div>

            </div>
          </div>

          <!-- 底部鍵盤輸入框與按鈕 -->
          <div class="flex flex-col sm:flex-row gap-3">
            <div class="relative flex-1">

            </div>

              </button>
              <button id="restartBtn2" class="retro-btn px-4 py-3 bg-[#b91c1c] hover:bg-[#cc2222] text-white font-bold flex items-center justify-center gap-1.5 text-sm">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i><span>RESTART</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- 遊戲初始開始畫面 -->

        <div class="text-center">

        <button id="startBtn" class="pixel-font retro-btn px-8 py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-black text-base tracking-widest">START GAME</button>
      </div>

        </div>
        <button id="deathRestartBtn" class="pixel-font retro-btn px-6 py-3 bg-[#b91c1c] hover:bg-[#cc2222] text-white font-bold text-sm tracking-widest">RETRY</button>

    </div>
  </div>

      "professional": "專業的", "qualification": "資格", "recognition": "認可", "recommend": "推薦", 
      "replacement": "替換", "representative": "代表", "significant": "重要的", "specification": "規格"
    };


    const dom = {};
    const domIds = ['gameScreen', 'track', 'pathLine', 'laserBubbleContainer', 'wordBox', 'typedInput', 'hpBar', 'hpText', 'wave', 'restartBtn2', 'deathRestartBtn', 'gameOverOverlay', 'finalWave', 'finalKills', 'pauseBtn', 'pauseIcon', 'pauseBtnText', 'pauseOverlay', 'heroSprite', 'startOverlay', 'startBtn', 'waveOverlay', 'waveBannerText', 'liveKills', 'progressText', 'progressBar'];
    
    // 虛擬畫布尺寸 (維持比例計算用)
    const VBW = 900, VBH = 450, DETECT_T = 0.99;

    // 怪物行走的折返路徑座標點
    const waypoints = [
      {x: 900, y: 225}, {x: 780, y: 225}, {x: 780, y: 75},  
      {x: 660, y: 75},  {x: 660, y: 375}, {x: 540, y: 375},
      {x: 540, y: 75},  {x: 420, y: 75},  {x: 420, y: 375}, 
      {x: 300, y: 375}, {x: 300, y: 75},  {x: 180, y: 75},
      {x: 180, y: 225}, {x: 75,  y: 225}  
    ];

    let pathSegments = [], totalPathLength = 0;
    for(let i=0; i<waypoints.length-1; i++) {
      let dx = waypoints[i+1].x - waypoints[i].x;
      let dy = waypoints[i+1].y - waypoints[i].y;
      let len = Math.sqrt(dx*dx + dy*dy);
      pathSegments.push({ start: waypoints[i], end: waypoints[i+1], length: len });
      totalPathLength += len;
    }

    // 計算特定進度 (t = 0~1) 所在的具體 X/Y 座標
    function getPointOnPathFixed(t) {
      let targetDist = t * totalPathLength;
      let accumulated = 0;
      for (let seg of pathSegments) {
        if (accumulated + seg.length >= targetDist) {
          let segT = (targetDist - accumulated) / seg.length;
          return {
            x: seg.start.x + (seg.end.x - seg.start.x) * segT,
            y: seg.start.y + (seg.end.y - seg.start.y) * segT
          };
        }
        accumulated += seg.length;
      }
      return waypoints[waypoints.length - 1];
    }

    let state, rafId = null, scale = {sx: 1, sy: 1};
    let bullets = []; 

    function computeScale(){
      if (!dom.track) return;
      const rect = dom.track.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return; 
      scale = {sx: rect.width / VBW, sy: rect.height / VBH};
    }

    const rand = arr => arr[Math.floor(Math.random() * arr.length)];

    // 根據目前的 Wave 波次決定單字難度抽卡機率
    function getWordForGame(wave) {
      const r = Math.random();
      // Wave 10 以上：大量高難度字
      if (wave >= 10) return rand(wordPool.hard);
      // Wave 7~9：混合中高難度字
      if (wave >= 7) return r < 0.2 ? rand(wordPool.easy) : r < 0.6 ? rand(wordPool.medium) : rand(wordPool.hard);
      // Wave 3~6：混合初中級單字
      if (wave >= 3) return r < 0.4 ? rand(wordPool.easy) : rand(wordPool.medium);
      // Wave 1~2：全初級單字給玩家熱身
      return rand(wordPool.easy);
    }

    // 怪物的 SVG 圖像庫
    const monsterGraphics = [
      `<svg class="w-8 h-8 text-yellow-600" viewBox="0 0 24 24" fill="currentColor"><path d="M4 2h16v4H4V2zm2 6h12v4H6V8zm-4 6h20v4H2v-4zm4 6h14v2H6v-2z"/></svg>`,
      `<svg class="w-8 h-8 text-stone-400" viewBox="0 0 24 24" fill="currentColor"><path d="M6 2h12v2H6V2zm-4 4h20v4H2V6zm4 6h12v6H6v-6zm-4 8h20v2H2v-2z"/></svg>`,
      `<svg class="w-8 h-8 text-emerald-700" viewBox="0 0 24 24" fill="currentColor"><path d="M2 4h20v4H2V4zm4 6h12v4H6v-4zm-2 6h16v6H4v-6z"/></svg>`
    ];

    // 初始化與重置遊戲狀態
    function fullReset(){
      if (rafId) cancelAnimationFrame(rafId);
      if (dom.track) dom.track.innerHTML = '';
      if (dom.laserBubbleContainer) dom.laserBubbleContainer.innerHTML = '';
      
      bullets.forEach(b => b.el.remove());
      bullets = [];

      // 初始化狀態機
      state = {
        hp: 100, 
        maxHp: 100, 
        kills: 0, 
        wave: 1,
        errorIndex: -1,
        monsters: [], 
        target: null, 
        running: true, 
        paused: false, 
        lastTime: performance.now(),
        spawnTimer: 0, 
        spawnInterval: 1500, // 初始生成速度：每 1.5 秒一隻
        monstersThisWave: 5, // Wave 1 總共要清空 5 隻怪
        spawnedThisWave: 0,  // 已「生成」的怪物數量
        processedThisWave: 0, // 本波已經「死亡/消失」的怪物數量 (用來計算進度條倒扣)
        baseSpeed: 0.33,     // 怪物基礎移動速度
        waveIntroActive: false
      };

      dom.pauseOverlay.style.display = dom.gameOverOverlay.style.display = 'none';
      dom.pauseBtnText.textContent = "PAUSE";
      
      dom.pauseIcon.setAttribute('data-lucide', 'pause');
      if (window.lucide) window.lucide.createIcons();

      dom.typedInput.disabled = false;
      dom.typedInput.value = '';
      
      setTimeout(() => dom.typedInput.focus(), 10);
      
      computeScale();
      updateHUD();
      dom.wordBox.innerHTML = '<span class="text-stone-500 pixel-font text-xs">SYSTEM_INIT_SUCCESS...</span>';
      
      triggerWaveIntro(1);

      // 啟動遊戲主迴圈
      rafId = requestAnimationFrame(loop);
    }

    // ==========================================
    // 觸發 Wave 波次轉換提示動畫 (含防呆清空機制)
    // ==========================================
    function triggerWaveIntro(waveNum) {
      state.waveIntroActive = true;
      dom.waveBannerText.textContent = `WAVE ${waveNum}`;
      dom.waveOverlay.style.display = 'flex';
      
      // 【防呆優化】換波次時，強制清空並鎖死輸入框，防止玩家在過場時亂打字
      dom.typedInput.value = ''; 
      dom.typedInput.disabled = true;

      dom.waveBannerText.classList.remove('wave-banner-anim');
      void dom.waveBannerText.offsetWidth; 
      dom.waveBannerText.classList.add('wave-banner-anim');

      setTimeout(() => {
        dom.waveOverlay.style.display = 'none';
        state.waveIntroActive = false; 
        if (state) state.spawnTimer = 0; 
        
        // 【防呆優化】過場結束後，解開輸入框鎖定並自動對焦，讓玩家可以馬上迎擊
        dom.typedInput.disabled = false;
        dom.typedInput.focus(); 
      }, 1500);
    }

    // ==========================================
    // 更新左側儀表板 UI (血量、進度條、擊殺數)
    // ==========================================
    function updateHUD(){
      // 1. 更新玩家血條顏色與長度
      const pct = Math.max(0, state.hp / state.maxHp * 100);
      dom.hpBar.style.width = pct + '%';
      dom.hpBar.className = `h-full transition-all duration-100 ${pct > 50 ? 'bg-emerald-600' : pct > 20 ? 'bg-amber-600' : 'bg-red-700 animate-pulse'}`;
      dom.hpText.textContent = `${Math.max(0, Math.round(state.hp))}/100`;
      dom.wave.textContent = state.wave;

      // 2. 更新總擊殺數
      if (dom.liveKills) dom.liveKills.textContent = state.kills;
      
      // 3. 更新剩餘怪物進度條
      if (dom.progressText && dom.progressBar) {
        // 剩餘要處理的怪物 = 這波總目標數量 - 已經死掉(被殺/撞家)的數量
        const remaining = state.monstersThisWave - state.processedThisWave;
        dom.progressText.textContent = `${remaining}/${state.monstersThisWave}`;
        
        // 進度條百分比：剩餘數量佔總數的比例 (一開始100%，慢慢變成0%)
        const progressPct = Math.max(0, (remaining / state.monstersThisWave) * 100);
        dom.progressBar.style.width = `${progressPct}%`;
      }
    }

    function currentSpeed(){
      return Math.max(0.01, state.baseSpeed + (state.wave * 0.02));
    }

    // 將邏輯座標轉換並套用至實際 HTML 元素
    function placeMonster(m){
      if (!m.el) return;
      const p = getPointOnPathFixed(m.t);
      m.el.style.left = `${(p.x / VBW) * 100}%`;
      m.el.style.top = `${(p.y / VBH) * 100}%`;
      m.el.style.transform = 'translate(-50%, -50%)';
    }

    // 擊殺時的粒子爆炸特效
    function triggerShatterEffect(x, y, color = '#d97706') {
      if (!dom.track) return;
      for (let i = 0; i < 12; i++) {
        const p = document.createElement('div'), size = Math.random() * 6 + 4, angle = Math.random() * Math.PI * 2, dist = Math.random() * 50 + 20;
        p.className = 'pixel-particle';
        p.style.cssText = `background-color: ${color}; border: 1px solid #000; left: ${x}px; top: ${y}px; width: ${size}px; height: ${size}px; --tx: ${Math.cos(angle) * dist}px; --ty: ${Math.sin(angle) * dist}px;`;
        dom.track.appendChild(p);
        setTimeout(() => p.remove(), 500);
      }
    }

    // 生成新怪物
    function spawnMonster(){
      if (!dom.track) return;
      const word = getWordForGame(state.wave);
      const el = document.createElement('div');
      el.className = "absolute flex flex-col items-center justify-center pointer-events-none select-none z-10 w-32 h-16";
      el.innerHTML = `
        <div>${rand(monsterGraphics)}</div>
        <div class="w-12 h-1.5 bg-black border border-black overflow-hidden mt-0.5">
          <div class="h-full w-full bg-amber-500"></div>
        </div>
        <div class="text-[11px] font-bold mt-0.5 px-1 py-0.5 border border-black bg-stone-900 text-stone-300 font-mono tracking-wide">${word}</div>
      `;
      dom.track.appendChild(el);

      const m = { word, t: 0, el, label: el.lastElementChild, dying: false };
      placeMonster(m);
      state.monsters.push(m);
      
      pickNextTarget();
    }

    // 智能對焦系統：尋找距離主堡最近的怪物作為輸入目標
    function pickNextTarget(){
      const activeMonsters = state.monsters.filter(m => !m.dying);
      
      if (activeMonsters.length === 0){ 
        state.target = null; 
        dom.wordBox.innerHTML = '<span class="text-stone-500 pixel-font text-xs">AWAITING_HOSTILES...</span>'; 
        return; 
      }
      
      // 依進度 t 排列，找最靠近主堡 (t最大的)
      activeMonsters.sort((a, b) => b.t - a.t);
      const nearestTarget = activeMonsters[0];
      
      if (state.target !== nearestTarget) {
        if (state.target && state.target.el) {
          state.target.label.className = "text-[11px] font-bold mt-0.5 px-1 py-0.5 border border-black bg-stone-900 text-stone-300 font-mono tracking-wide";
        }
        state.target = nearestTarget;
        // 把目標怪物掛上閃爍高亮的邊框
        state.target.label.className = "text-[12px] font-black mt-0.5 px-1 py-0.5 border-2 border-amber-600 bg-amber-950 text-amber-400 font-mono tracking-wide shadow-md animate-pulse";
      }
      renderSpectrumHighlight();
    }

    // 渲染正上方文字區的輸入狀態 (正確綠字/錯誤紅字)
    function renderSpectrumHighlight() {
      if (!state.target || !dom.track) return;
      
      const baseWord = state.target.word, typed = dom.typedInput.value;

      let htmlOutput = Array.from(baseWord).map((char, i) => {
        if (i < typed.length) {
          return char === typed[i] ? `<span class="text-emerald-500 font-black border-b-2 border-emerald-500">${char}</span>` : `<span class="text-red-500 font-black bg-red-950/80 px-0.5 border border-red-600">${char}</span>`;
        }
        if (i === state.errorIndex) {
          return `<span class="text-red-500 font-black bg-red-950/80 px-0.5 border border-red-600">${char}</span>`;
        }
        return `<span class="text-stone-400">${char}</span>`;
      }).join('');

      // 加上中文翻譯註解
      if (translations[baseWord]) htmlOutput += `<span class="text-sm text-stone-500 font-bold ml-4 font-sans">/* ${translations[baseWord]} */</span>`;
      dom.wordBox.innerHTML = htmlOutput;
    }

    // 發射防禦子彈
    function fireBulletAt(targetMonster) {
      if (!dom.track || !targetMonster) return;
      
      targetMonster.dying = true; // 標記為死亡，停止移動

      const heroRect = dom.heroSprite.getBoundingClientRect();
      const parentRect = dom.track.getBoundingClientRect();
      
      const startX = heroRect.left - parentRect.left + (heroRect.width / 2);
      const startY = heroRect.top - parentRect.top + (heroRect.height / 2);

      const bulletEl = document.createElement('div');
      bulletEl.className = 'bullet';
      bulletEl.style.left = `${startX}px`;
      bulletEl.style.top = `${startY}px`;
      dom.track.appendChild(bulletEl);

      bullets.push({
        el: bulletEl,
        x: startX,
        y: startY,
        target: targetMonster,
        speed: 2.5 // 子彈飛行速度
      });

      pickNextTarget();
    }

    // 從畫面與記憶體中移除怪物，並處理波次切換
    function removeMonster(m){
      if (m.el) m.el.remove();
      state.monsters = state.monsters.filter(x => x !== m);
      if (state.target === m) state.target = null;
      pickNextTarget();

      // 每當有怪物被處理掉(擊殺或撞主堡)，已處理數量+1，用來倒扣進度條
      state.processedThisWave++; 
      
      // 判定是否換波次 (這波該生的怪都生完了 && 場上已經清空)
      if (state.spawnedThisWave >= state.monstersThisWave && state.monsters.length === 0){
        state.wave++; 
        state.monstersThisWave = 4 + Math.floor(state.wave * 1.2); // 怪物數量隨波次增加
        state.spawnedThisWave = 0;
        state.processedThisWave = 0; // 新的一波，重置進度條與已處理數量
        // 出怪速度越來越快 (最小極限為 650ms)
        state.spawnInterval = Math.max(650, state.spawnInterval - 50);
        
        triggerWaveIntro(state.wave);
      }
      updateHUD(); // 更新進度條
    }

    // ==========================================
    // 遊戲核心引擎：主迴圈 Game Loop
    // ==========================================
    function loop(now){
      if (!state || !state.running) return;
      if (state.paused){ state.lastTime = now; rafId = requestAnimationFrame(loop); return; }
      
      // 1. 計算時間差 Delta Time
      let dt = Math.min(200, now - state.lastTime);
      state.lastTime = now;

      if (state.waveIntroActive) {
        rafId = requestAnimationFrame(loop);
        return;
      }

      // 2. 計時器：時間到就生成一隻新怪物
      if ((state.spawnTimer += dt) > state.spawnInterval && state.spawnedThisWave < state.monstersThisWave){
        state.spawnTimer = 0; 
        state.spawnedThisWave++; 
        spawnMonster();
      }

      const speed = currentSpeed();
      
      // 3. 更新所有怪物的狀態
      for (const m of [...state.monsters]){
        if (!m.dying) { 
          m.t += speed * dt * 0.0001; // 怪物往前邁進
        }
        
        // 如果怪物走到盡頭 (撞到主堡)
        if (m.t >= DETECT_T){
          state.hp -= 10; // 主堡扣血量
          dom.typedInput.value = '';
          dom.gameScreen.classList.add('damage-flash'); // 畫面發紅震動
          setTimeout(() => dom.gameScreen.classList.remove('damage-flash'), 300); 
          
          removeMonster(m);
          
          // 血量歸零：GameOver
          if (state.hp <= 0){
            updateHUD(); state.running = false; cancelAnimationFrame(rafId);
            dom.typedInput.disabled = true;
            dom.finalWave.textContent = state.wave; 
            dom.finalKills.textContent = state.kills;
            dom.gameOverOverlay.style.display = 'flex';
            return;
          }
        } else placeMonster(m);
      }

      // 4. 更新子彈的飛行軌跡
      const parentRect = dom.track.getBoundingClientRect();
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        
        if (!state.monsters.includes(b.target)) {
          b.el.remove();
          bullets.splice(i, 1);
          continue;
        }

        const mRect = b.target.el.getBoundingClientRect();
        const targetX = mRect.left - parentRect.left + (mRect.width / 2);
        const targetY = mRect.top - parentRect.top + (mRect.height / 2);

        const dx = targetX - b.x;
        const dy = targetY - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const moveDist = b.speed * dt;

        // 如果子彈追上怪物 (命中判定)
        if (dist <= moveDist + 15) {
          triggerShatterEffect(targetX, targetY);
          state.kills++; // 成功消滅，加擊殺數
          removeMonster(b.target); // 將怪物消滅
          b.el.remove();
          bullets.splice(i, 1);
        } else {
          // 子彈繼續飛行
          b.x += (dx / dist) * moveDist;
          b.y += (dy / dist) * moveDist;
          b.el.style.left = `${b.x}px`;
          b.el.style.top = `${b.y}px`;
        }
      }

      state.monsters.filter(m => !m.dying).length > 0 ? pickNextTarget() : null;
      
      // 5. 要求瀏覽器準備渲染下一張畫面
      rafId = requestAnimationFrame(loop);
    }

    function init() {
      domIds.forEach(id => dom[id] = document.getElementById(id));
      
      if (dom.pathLine) {
        dom.pathLine.setAttribute('d', `M ${waypoints.map(p => p.x + ' ' + p.y).join(' L ')}`);
      }
      
      window.addEventListener('resize', () => {
        computeScale();
        state?.monsters.forEach(placeMonster);
      });

      // ==========================================
      // 精準單字紅字機制監聽
      // ==========================================
      dom.typedInput.addEventListener('input', () => {
        if (!state?.running || state.paused || !state.target || state.waveIntroActive) return;
        
        const typed = dom.typedInput.value.toLowerCase();
        const targetStr = state.target.word.toLowerCase();

        // 檢查玩家輸入的前綴是否正確
        if (targetStr.startsWith(typed)) {
          state.errorIndex = -1; 
          // 整個字串匹配完成 (成功打完單字)
          if (typed === targetStr) {
            fireBulletAt(state.target);
            dom.typedInput.value = ''; 
            updateHUD();
          }
        } else {
          // 輸入錯誤了！
          state.errorIndex = typed.length - 1; 
          
          dom.wordBox.classList.remove('error-shake');
          void dom.wordBox.offsetWidth; 
          dom.wordBox.classList.add('error-shake'); // 單字框左右震動
          
          setTimeout(() => {
            dom.wordBox.classList.remove('error-shake');
            state.errorIndex = -1; 
            renderSpectrumHighlight();
          }, 300);

          // 防止錯誤字元輸入
          dom.typedInput.value = typed.slice(0, -1);
          updateHUD();
        }
        
        renderSpectrumHighlight();
      });

      dom.typedInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          if (!state || state.paused || !state.running || state.waveIntroActive) return;
          const val = dom.typedInput.value.trim();
          dom.typedInput.value = '';
          if (val !== "" && (!state.target || val !== state.target.word)) {
            dom.typedInput.classList.add('damage-flash');
            setTimeout(() => dom.typedInput.classList.remove('damage-flash'), 300);
            updateHUD(); renderSpectrumHighlight();
          }
        }
      });

      // 暫停按鈕邏輯
      dom.pauseBtn.addEventListener('click', () => {
        if (!state?.running || state.waveIntroActive) return;
        state.paused = !state.paused;
        dom.pauseOverlay.style.display = state.paused ? 'flex' : 'none';
        dom.pauseBtnText.textContent = state.paused ? "RESUME" : "PAUSE";
        dom.pauseIcon.className = state.paused ? "w-4 h-4 text-emerald-400" : "w-4 h-4"; 
        dom.pauseIcon.setAttribute('data-lucide', state.paused ? 'play' : 'pause');
        if (!state.paused) dom.typedInput.focus();
        if (window.lucide) window.lucide.createIcons();
      });

      dom.restartBtn2.addEventListener('click', fullReset);
      dom.deathRestartBtn.addEventListener('click', fullReset);
      
      if (dom.startBtn) {
        dom.startBtn.addEventListener('click', function() {
          dom.startOverlay.style.display = 'none';
          fullReset();
          dom.typedInput.focus(); 
        });
      }
    }

    window.onload = function() {
      init();
    };
  })();
  </script>
</body>
</html>
